name: Package

on:
  push:
    branches: [ master, develop, beta ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            installer-type: dmg
          - os: windows-latest
            installer-type: msi
          - os: ubuntu-latest
            installer-type: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        if: runner.os == 'macOS' || runner.os == 'Linux'
        run: chmod +x gradlew

      - name: Install jpackage dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y fakeroot

      - name: Build and package
        run: ./gradlew installDist jpackageApp

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.installer-type }}
          path: build/jpackage/
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: installer-dmg
          path: artifacts/macos

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: installer-exe
          path: artifacts/windows

      - name: Download Linux installer
        uses: actions/download-artifact@v4
        with:
          name: installer-deb
          path: artifacts/linux

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          if [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            PRERELEASE="--prerelease"
          else
            PRERELEASE=""
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "WFH Billing Statement Generator $VERSION" \
            --generate-notes \
            $PRERELEASE \
            artifacts/macos/* \
            artifacts/windows/* \
            artifacts/linux/*